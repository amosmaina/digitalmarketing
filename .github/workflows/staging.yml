name: Deploy to Staging via FTP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4' # Changed from 8.0 to match laravel/ui v3.0 requirements
          tools: composer:v2

      - name: Validate Composer
        run: composer validate

      - name: Install Dependencies
        run: |
          composer install \
            --no-ansi \
            --no-dev \
            --no-interaction \
            --no-progress \
            --optimize-autoloader \
            --ignore-platform-reqs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16' # Mix 5 works best with Node 16

      - name: Install NPM Dependencies
        run: |
          npm install
          npm run production

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.STAGING_PATH }}/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/storage/**
            **/.env
            **/.env.*